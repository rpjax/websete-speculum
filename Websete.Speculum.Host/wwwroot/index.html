<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Speculum</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #0d0d0d;
    color: #e0e0e0;
    font-family: system-ui, sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Toolbar ─────────────────────────────────────────────────────────── */
  #toolbar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    user-select: none;
  }

  #brand {
    font-size: 13px;
    font-weight: 600;
    color: #888;
    white-space: nowrap;
    letter-spacing: 0.05em;
  }

  /* URL bar is display-only — the MITM engine determines the target URL.
     Users navigate by interacting with the virtual browser itself. */
  #url-bar {
    flex: 1;
    background: #0d0d0d;
    border: 1px solid #333;
    border-radius: 4px;
    color: #888;
    font-size: 13px;
    padding: 5px 10px;
    outline: none;
    cursor: default;
    user-select: text; /* allow copying, but not typing */
  }

  #back-btn, #fwd-btn {
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    border-radius: 4px;
    color: #e0e0e0;
    cursor: pointer;
    font-size: 13px;
    padding: 5px 10px;
    white-space: nowrap;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  #back-btn:hover, #fwd-btn:hover { background: #333; }
  #back-btn:disabled, #fwd-btn:disabled { opacity: 0.4; cursor: default; }

  #status {
    font-size: 11px;
    color: #888;
    white-space: nowrap;
  }
  #status.connected   { color: #4caf50; }
  #status.connecting  { color: #ff9800; }
  #status.error       { color: #f44336; }

  /* ── FPS counter (dev only) ──────────────────────────────────────────── */
  #fps {
    display: none;
    font-size: 11px;
    color: #555;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    min-width: 52px;
    text-align: right;
  }
  #fps.active { display: block; }

  /* ── Viewport ────────────────────────────────────────────────────────── */
  #viewport {
    flex: 1 1 auto;
    position: relative;
    overflow: hidden;
    touch-action: none; /* let canvas handle all touch events */
  }

  /* Canvas covers the viewport exactly — 1:1 pixel mapping when the virtual
     browser resolution matches the viewport size (maintained via ResizeObserver
     + xrandr live resize).  No aspect-ratio letterboxing; no scaling. */
  #canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    cursor: default;
    image-rendering: pixelated;
    touch-action: none;
  }

  /* ── Overlay ─────────────────────────────────────────────────────────── */
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(13,13,13,0.85);
    gap: 16px;
  }
  #overlay.hidden { display: none; }

  #overlay p { color: #888; font-size: 14px; }

  #connect-btn {
    background: #1e88e5;
    border: none;
    border-radius: 6px;
    color: #fff;
    cursor: pointer;
    font-size: 14px;
    padding: 10px 28px;
    transition: background 0.15s;
  }
  #connect-btn:hover { background: #1565c0; }
</style>
</head>
<body>

<!-- ── Toolbar ────────────────────────────────────────────────────────────── -->
<div id="toolbar">
  <span id="brand">SPECULUM</span>
  <button id="back-btn" disabled title="Back">&#8592;</button>
  <button id="fwd-btn"  disabled title="Forward">&#8594;</button>
  <input id="url-bar" type="text" placeholder="—" spellcheck="false" readonly tabindex="-1"/>
  <span id="status" class="connecting">Connecting...</span>
  <span id="fps"></span>
</div>

<!-- ── Viewport ───────────────────────────────────────────────────────────── -->
<div id="viewport">
  <canvas id="canvas"></canvas>

  <div id="overlay">
    <p>Remote browser not connected</p>
    <button id="connect-btn">Connect</button>
  </div>
</div>

<script>
'use strict';

// ── Dev mode ──────────────────────────────────────────────────────────────────
const IS_DEV = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

// ── Protocol constants ────────────────────────────────────────────────────────
const MSG_TILE        = 0x01;
const MSG_FULL        = 0x02;
// 0x03 = skip: nothing to render
const MSG_URL         = 0x04;  // URL update from sidecar
const MSG_CONSOLE     = 0x05;  // Virtual browser console output
const MSG_EVAL_RESULT = 0x06;  // vcon() evaluation result

const VCON_METHODS = ['log', 'warn', 'error', 'info', 'debug'];

// ── DOM refs ──────────────────────────────────────────────────────────────────
const canvas     = document.getElementById('canvas');
const ctx        = canvas.getContext('2d');
const overlay    = document.getElementById('overlay');
const statusEl   = document.getElementById('status');
const urlBar     = document.getElementById('url-bar');
const backBtn    = document.getElementById('back-btn');
const fwdBtn     = document.getElementById('fwd-btn');
const connectBtn = document.getElementById('connect-btn');
const viewport   = document.getElementById('viewport');
const fpsEl      = document.getElementById('fps');

if (IS_DEV) fpsEl.classList.add('active');

// ── Session state ─────────────────────────────────────────────────────────────
let hub             = null;
let ws              = null;
let sessionId       = null;
let sessionW        = 1280;
let sessionH        = 720;
let jsBridgeEnabled = false;

// ── JsBridge — pending vcon() calls ───────────────────────────────────────────
let   _evalId      = 0;
const _evalPending = new Map(); // id → { resolve, reject, timer }

// ── Canvas layout ─────────────────────────────────────────────────────────────
// The canvas element fills its parent (#viewport) via CSS (position:absolute,
// inset:0). We only need to update the canvas pixel buffer dimensions so they
// match the viewport's CSS pixel size — giving 1:1 mapping with zero scaling.
function syncCanvasSize(w, h) {
  sessionW      = w;
  sessionH      = h;
  canvas.width  = w;
  canvas.height = h;
  invalidateRect(); // canvas dimensions changed → cached rect is stale
}

// ── ResizeObserver — propagates viewport size changes to the virtual browser ──
// Debounced 250 ms to avoid flooding the sidecar during continuous drag-resize.
// Only fires once the WebSocket is open (no session → no resize to send).
let resizeTimer = null;

const resizeObserver = new ResizeObserver(entries => {
  const entry = entries[0];
  if (!entry) return;
  const w = Math.round(entry.contentRect.width);
  const h = Math.round(entry.contentRect.height);
  if (w < 100 || h < 100) return;   // ignore degenerate sizes during layout
  if (w === sessionW && h === sessionH) return; // nothing changed

  // Viewport geometry changed → cached rect is definitely stale.
  invalidateRect();

  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    // Update the canvas buffer immediately so new frames paint at the right size.
    // The canvas will appear blank for ~600 ms while the sidecar resizes Xvfb
    // and restarts FFmpeg — this is acceptable.
    syncCanvasSize(w, h);

    // Tell the sidecar to resize the virtual display.
    if (ws && ws.readyState === WebSocket.OPEN) {
      sendInput({ type: 'resize', width: w, height: h });
    }
  }, 250);
});

resizeObserver.observe(viewport);

// ── Status indicator ──────────────────────────────────────────────────────────
function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className   = cls;
}

// ── FPS counter (dev only) ────────────────────────────────────────────────────
let fpsFrames  = 0;
let fpsLastTs  = performance.now();

function tickFps() {
  if (!IS_DEV) return;
  fpsFrames++;
  const now     = performance.now();
  const elapsed = now - fpsLastTs;
  if (elapsed >= 1000) {
    fpsEl.textContent = Math.round(fpsFrames * 1000 / elapsed) + ' fps';
    fpsFrames = 0;
    fpsLastTs = now;
  }
}

// ── Frame rendering (requestAnimationFrame-paced) ─────────────────────────────
// One slot: the latest frame waiting to be rendered. Older frames are evicted
// when a newer one arrives — we always render the most recent state, never a
// stale backlog. This keeps latency at one frame regardless of how fast frames
// arrive vs. how fast the GPU can draw.
let pendingFrame = null;
let rafPending   = false;

function scheduleRender() {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(renderNext);
}

function renderNext() {
  rafPending   = false;
  const fn     = pendingFrame;
  pendingFrame = null;
  if (!fn) return;
  fn().then(() => {
    tickFps();
    if (pendingFrame) scheduleRender(); // another frame arrived while we were drawing
  });
}

async function handleFrame(buffer) {
  if (!(buffer instanceof ArrayBuffer)) return;
  const view = new DataView(buffer);
  if (buffer.byteLength < 1) return;
  const type = view.getUint8(0);

  if (type === MSG_FULL) {
    // Layout: [0] type | [1-4] frameId | [5-8] len | [9+] jpeg
    if (buffer.byteLength < 9) return;
    const len = view.getUint32(5, true);
    if (9 + len > buffer.byteLength) return;
    const jpeg = buffer.slice(9, 9 + len);

    // Evict any pending frame — we only ever render the latest one.
    pendingFrame = async () => {
      const blob = new Blob([jpeg], { type: 'image/jpeg' });
      const bmp  = await createImageBitmap(blob);
      try   { ctx.drawImage(bmp, 0, 0, sessionW, sessionH); }
      finally { bmp.close(); }
    };
    scheduleRender();

  } else if (type === MSG_TILE) {
    // Tile frames are kept for backwards-compatibility but the sidecar no
    // longer sends them. If they do arrive, render them as a batch.
    if (buffer.byteLength < 7) return;
    const numTiles = view.getUint16(5, true);
    let offset = 7;
    const tiles = [];

    for (let i = 0; i < numTiles; i++) {
      if (offset + 12 > buffer.byteLength) break;
      const x   = view.getUint16(offset, true); offset += 2;
      const y   = view.getUint16(offset, true); offset += 2;
      const w   = view.getUint16(offset, true); offset += 2;
      const h   = view.getUint16(offset, true); offset += 2;
      const len = view.getUint32(offset, true); offset += 4;
      if (offset + len > buffer.byteLength) break;
      tiles.push({ x, y, w, h, jpeg: buffer.slice(offset, offset + len) });
      offset += len;
    }

    if (tiles.length === 0) return;

    pendingFrame = async () => {
      await Promise.all(tiles.map(async ({ x, y, w, h, jpeg }) => {
        const blob = new Blob([jpeg], { type: 'image/jpeg' });
        const bmp  = await createImageBitmap(blob);
        try   { ctx.drawImage(bmp, x, y, w, h); }
        finally { bmp.close(); }
      }));
    };
    scheduleRender();

  } else if (type === MSG_URL) {
    // Layout: [0] type | [1-4] len | [5+] UTF-8 url
    if (buffer.byteLength < 5) return;
    const len = view.getUint32(1, true);
    if (5 + len > buffer.byteLength) return;
    const url = new TextDecoder().decode(new Uint8Array(buffer, 5, len));
    urlBar.value = url;

  } else if (type === MSG_CONSOLE) {
    // Layout: [0] type | [1] level | [2-5] len | [6+] UTF-8 text
    if (buffer.byteLength < 6) return;
    const level = view.getUint8(1);
    const len   = view.getUint32(2, true);
    if (6 + len > buffer.byteLength) return;
    const text  = new TextDecoder().decode(new Uint8Array(buffer, 6, len));
    const fn    = console[VCON_METHODS[level] ?? 'log'];
    fn.call(console,
      '%c[VCON]%c ' + text,
      'color:#ff9800;font-weight:bold;font-family:monospace',
      'color:inherit;font-family:monospace',
    );

  } else if (type === MSG_EVAL_RESULT) {
    // Layout: [0] type | [1-4] id | [5] ok | [6-9] len | [10+] UTF-8 value
    if (buffer.byteLength < 10) return;
    const id    = view.getUint32(1, true);
    const ok    = view.getUint8(5) === 1;
    const len   = view.getUint32(6, true);
    if (10 + len > buffer.byteLength) return;
    const value = new TextDecoder().decode(new Uint8Array(buffer, 10, len));
    const pending = _evalPending.get(id);
    if (pending) {
      clearTimeout(pending.timer);
      _evalPending.delete(id);
      if (ok) {
        // Empty value = undefined result (e.g. console.log return value).
        if (value === '') { pending.resolve(undefined); return; }
        try   { pending.resolve(JSON.parse(value)); }
        catch { pending.resolve(value); } // not JSON — return as string
      } else {
        pending.reject(new Error(value));
      }
    }

  } else if (type !== 0x03) {
    console.warn('[speculum] Unknown frame type:', type);
  }
}

// ── JsBridge client — vcon() + startup banner ─────────────────────────────────

/**
 * Exposes window.vcon(code) — evaluates JavaScript in the virtual browser
 * and returns the result as a Promise. Console output produced by the code
 * appears in the local console with [VCON]: prefix via the console bridge.
 *
 * Example:
 *   await vcon('window.location.href')    // → "https://..."
 *   await vcon('console.log(document.title)')  // → undefined + [VCON]: title
 */
function installVcon() {
  window.vcon = function vcon(code) {
    return new Promise(function (resolve, reject) {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        reject(new Error('[vcon] No active session'));
        return;
      }
      const id = ++_evalId;
      const timer = setTimeout(function () {
        if (_evalPending.has(id)) {
          _evalPending.delete(id);
          reject(new Error('[vcon] Timed out after 10 s'));
        }
      }, 10_000);
      _evalPending.set(id, { resolve, reject, timer });
      sendInput({ type: 'evaljs', id, code });
    });
  };
}

function uninstallVcon() {
  delete window.vcon;
}

/**
 * Prints a formatted startup banner to the browser console every time a new
 * session is established (WS opened). Shows session ID, viewport, and
 * JsBridge status so the operator knows the current configuration at a glance.
 */
function printBanner() {
  const BADGE = 'background:#1565c0;color:#fff;font-weight:bold;padding:2px 8px;border-radius:3px;letter-spacing:.05em';
  const DIM   = 'color:#666;font-weight:bold';
  const VAL   = 'color:#ddd;font-family:monospace';
  const OK    = 'background:#1b5e20;color:#a5d6a7;padding:1px 5px;border-radius:2px;font-weight:bold';
  const NOK   = 'background:#b71c1c;color:#ef9a9a;padding:1px 5px;border-radius:2px;font-weight:bold';
  const HINT  = 'color:#666;font-style:italic';

  console.groupCollapsed(
    '%c SPECULUM %c — virtual browser bridge',
    BADGE, 'color:#888',
  );
  console.log('%cSession  %c' + sessionId,         DIM, VAL);
  console.log('%cViewport %c' + sessionW + '×' + sessionH, DIM, VAL);

  if (jsBridgeEnabled) {
    console.log('%cJsBridge %cenabled %c→ await window.vcon(code)', DIM, OK, HINT);
  } else {
    console.log('%cJsBridge %cdisabled', DIM, NOK);
  }

  console.groupEnd();
}

// ── Input helpers ─────────────────────────────────────────────────────────────
// Cache the bounding rect so mousemove never triggers a layout reflow.
// Invalidated by ResizeObserver (viewport size change) and by the resize
// debounce callback (canvas dimensions updated), which both cover every
// case where the rect can change.
let _cachedRect = null;

function invalidateRect() { _cachedRect = null; }

function canvasToPage(clientX, clientY) {
  if (!_cachedRect) _cachedRect = canvas.getBoundingClientRect();
  return {
    x: Math.round((clientX - _cachedRect.left) * (sessionW / _cachedRect.width)),
    y: Math.round((clientY - _cachedRect.top)  * (sessionH / _cachedRect.height)),
  };
}

function sendInput(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  }
}

// ── Mouse events ──────────────────────────────────────────────────────────────
let lastMoveTime  = 0;
// Tracks which buttons are currently held (mousedown came from canvas).
// Used to: (a) catch mouseup outside the canvas, (b) continue reporting
// mousemove during drag even when the cursor leaves the canvas element.
const pressedBtns = new Set();

canvas.addEventListener('mousemove', e => {
  const now = performance.now();
  if (now - lastMoveTime < 16) return; // ~60 Hz cap
  lastMoveTime = now;
  const {x, y} = canvasToPage(e.clientX, e.clientY);
  sendInput({ type: 'mousemove', x, y });
});

canvas.addEventListener('mousedown', e => {
  e.preventDefault();
  canvas.focus();
  pressedBtns.add(e.button);
  const {x, y} = canvasToPage(e.clientX, e.clientY);
  sendInput({ type: 'mousedown', x, y, button: e.button });
});

// Listen on window so mouseup is always caught even if the cursor left the
// canvas while a button was held (drag-out). The pressedBtns guard prevents
// forwarding releases for clicks that never started on the canvas.
window.addEventListener('mouseup', e => {
  if (!pressedBtns.has(e.button)) return;
  pressedBtns.delete(e.button);
  const {x, y} = canvasToPage(e.clientX, e.clientY);
  sendInput({ type: 'mouseup', x, y, button: e.button });
});

// Continue tracking position while dragging outside the canvas boundary.
window.addEventListener('mousemove', e => {
  if (pressedBtns.size === 0) return; // not dragging — canvas listener handles in-bounds moves
  const now = performance.now();
  if (now - lastMoveTime < 16) return;
  lastMoveTime = now;
  const {x, y} = canvasToPage(e.clientX, e.clientY);
  sendInput({ type: 'mousemove', x, y });
});

canvas.addEventListener('contextmenu', e => e.preventDefault());

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const {x, y} = canvasToPage(e.clientX, e.clientY);
  // Normalize deltaMode to pixels before forwarding.
  //   deltaMode 0 = DOM_DELTA_PIXEL  → already pixels (trackpads, most browsers)
  //   deltaMode 1 = DOM_DELTA_LINE   → ×40 px/line  (typical physical mouse wheel on Windows)
  //   deltaMode 2 = DOM_DELTA_PAGE   → ×viewport height/width
  let dX = e.deltaX, dY = e.deltaY;
  if      (e.deltaMode === 1) { dX *= 40; dY *= 40; }
  else if (e.deltaMode === 2) { dX *= canvas.clientWidth; dY *= canvas.clientHeight; }
  sendInput({ type: 'wheel', x, y, deltaX: dX, deltaY: dY });
}, { passive: false });

// ── Touch events — mapped to pointer messages ─────────────────────────────────
// Single-touch → left-button mouse. Multi-touch is not forwarded (rare need,
// would require CDP touch API on the sidecar side).
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  canvas.focus();
  const t = e.changedTouches[0];
  if (!t) return;
  const {x, y} = canvasToPage(t.clientX, t.clientY);
  sendInput({ type: 'mousedown', x, y, button: 0 });
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  if (!t) return;
  const now = performance.now();
  if (now - lastMoveTime < 16) return;
  lastMoveTime = now;
  const {x, y} = canvasToPage(t.clientX, t.clientY);
  sendInput({ type: 'mousemove', x, y });
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  if (!t) return;
  const {x, y} = canvasToPage(t.clientX, t.clientY);
  sendInput({ type: 'mouseup', x, y, button: 0 });
}, { passive: false });

canvas.addEventListener('touchcancel', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  if (!t) return;
  const {x, y} = canvasToPage(t.clientX, t.clientY);
  sendInput({ type: 'mouseup', x, y, button: 0 });
}, { passive: false });

// ── Keyboard events ───────────────────────────────────────────────────────────
canvas.setAttribute('tabindex', '0');

// Tracks keys for which we forwarded a keydown. Ensures:
//   • keyup is only sent when there is a matching keydown (prevents spurious
//     keyup for passthrough keys like F12 that we never forwarded as keydown).
//   • blur can release all held keys atomically, preventing stuck modifiers
//     and stuck printable keys when the canvas loses focus.
const heldKeys = new Set();

canvas.addEventListener('keydown', e => {
  // Pass these through to the host browser unchanged.
  if (e.key === 'F12') return;
  if ((e.ctrlKey || e.metaKey) && ['r', 'l', 't', 'w', 'n'].includes(e.key.toLowerCase())) return;

  e.preventDefault();
  heldKeys.add(e.key);
  sendInput({ type: 'keydown', key: e.key });
});

canvas.addEventListener('keyup', e => {
  // Only forward keyup when we forwarded the matching keydown.
  if (!heldKeys.has(e.key)) return;
  heldKeys.delete(e.key);
  sendInput({ type: 'keyup', key: e.key });
});

// When the canvas loses focus, release every held key in the virtual browser.
// Without this, modifier keys (Shift, Ctrl…) and held printable keys would
// remain stuck until the user presses and releases them again.
canvas.addEventListener('blur', () => {
  for (const key of heldKeys) {
    sendInput({ type: 'keyup', key });
  }
  heldKeys.clear();
});

// ── Navigation ────────────────────────────────────────────────────────────────
// Navigation is driven by the MITM engine — users interact with the virtual
// browser directly (click links, use back/forward). There is no "navigate to"
// command from the client.
backBtn.addEventListener('click', () => sendInput({ type: 'goback' }));
fwdBtn.addEventListener('click',  () => sendInput({ type: 'goforward' }));

// ── WebSocket (binary frame streaming + input) ────────────────────────────────
function openWebSocket(sid) {
  const scheme = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${scheme}://${location.host}/ws/${sid}`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    setStatus('Streaming', 'connected');
    backBtn.disabled = false;
    fwdBtn.disabled  = false;
    overlay.classList.add('hidden');
    canvas.focus();
    printBanner();
  };

  ws.onmessage = e => {
    handleFrame(e.data);
  };

  ws.onclose = () => {
    setStatus('Disconnected — click to reconnect', 'error');
    backBtn.disabled = true;
    fwdBtn.disabled  = true;
    overlay.classList.remove('hidden');
    ws = null;

    // The virtual browser is gone — discard any held input state so stale
    // entries don't carry over into the next session.
    heldKeys.clear();
    pressedBtns.clear();

    // Cancel all pending vcon() calls so they reject immediately instead of
    // hanging until their 10 s timeout fires.
    for (const { reject, timer } of _evalPending.values()) {
      clearTimeout(timer);
      reject(new Error('[vcon] Session closed'));
    }
    _evalPending.clear();

    // Remove vcon from the global scope — it's session-scoped.
    if (jsBridgeEnabled) uninstallVcon();
    jsBridgeEnabled = false;
  };

  ws.onerror = err => console.error('[ws]', err);
}

// ── SignalR + session creation ─────────────────────────────────────────────────
async function connect() {
  // Clean up any previous hub so reconnect doesn't leak SignalR connections.
  if (hub) {
    try { await hub.stop(); } catch { /* ignore */ }
    hub = null;
  }

  setStatus('Connecting...', 'connecting');
  connectBtn.disabled = true;

  try {
    hub = new signalR.HubConnectionBuilder()
      .withUrl('/hub/virtualization')
      .withAutomaticReconnect()
      .configureLogging(signalR.LogLevel.Warning)
      .build();

    hub.onclose(() => {
      setStatus('Hub disconnected', 'error');
      overlay.classList.remove('hidden');
    });

    await hub.start();

    // Use the actual viewport pixel dimensions so the virtual browser
    // resolution matches the client's available space from the first frame.
    const initW = viewport.clientWidth  || 1280;
    const initH = viewport.clientHeight || 720;

    // Send the current page URL so the server can apply MITM forwarding rules
    // and open the virtual browser at the corresponding upstream URL.
    // e.g. "https://www.websete.localhost/cars?q=1"
    //   → "https://www.olx.com.br/cars?q=1" (after rewriting on the server)
    const resp = await hub.invoke('CreateSessionAsync', {
      width:      initW,
      height:     initH,
      initialUrl: window.location.href,
    });

    sessionId       = resp.sessionId;
    jsBridgeEnabled = resp.jsBridgeEnabled ?? false;

    // Server echoes back the accepted dimensions (may clamp if out of range).
    syncCanvasSize(resp.width, resp.height);

    // Expose window.vcon() when the bridge is enabled so the operator can
    // evaluate JS in the virtual browser from the downstream console.
    if (jsBridgeEnabled) installVcon();

    openWebSocket(sessionId);

  } catch (err) {
    console.error('[connect]', err);
    setStatus('Error: ' + err.message, 'error');
    connectBtn.disabled = false;
  }
}

connectBtn.addEventListener('click', connect);

// Auto-connect on load.
connect();
</script>
</body>
</html>

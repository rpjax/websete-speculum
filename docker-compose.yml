services:
  speculum:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # Override Camoufox path here if needed (default is set in Dockerfile)
      # - Camoufox__ExecutablePath=/opt/camoufox
    restart: unless-stopped
    # Firefox's content-process sandbox requires this in Docker.
    # Without it, Camoufox will fail to launch child processes.
    cap_add:
      - SYS_ADMIN
    # Shared memory — Firefox uses /dev/shm for IPC between processes.
    # Each session spawns a dedicated Firefox process; 512 MB per session is
    # typical. 2 GB covers ~4 concurrent sessions with headroom.
    shm_size: 2gb

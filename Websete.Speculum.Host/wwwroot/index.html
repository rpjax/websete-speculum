<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speculum</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }

    #url-bar {
      flex: 1;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 13px;
      padding: 5px 10px;
      outline: none;
    }

    #url-bar:focus { border-color: #5a8dee; }

    button {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 12px;
      padding: 5px 12px;
    }

    button:hover  { background: #3a3a3a; }
    button:disabled { opacity: 0.4; cursor: default; }

    #status-bar {
      font-size: 11px;
      color: #888;
      padding: 0 4px;
      white-space: nowrap;
    }

    #viewport {
      flex: 1;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: #111;
    }

    #screen {
      cursor: crosshair;
      display: block;
      image-rendering: pixelated;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    #overlay h2 { font-size: 18px; font-weight: 500; }
    #overlay p  { font-size: 13px; color: #888; }

    #connect-btn {
      background: #5a8dee;
      border-color: #5a8dee;
      padding: 8px 24px;
      font-size: 14px;
    }

    #connect-btn:hover { background: #4a7dde; }
  </style>
</head>
<body>

<div id="toolbar">
  <span style="font-size:13px;font-weight:600;color:#5a8dee">Speculum</span>
  <input id="url-bar" type="text" placeholder="https://example.com" value="https://example.com" />
  <button id="go-btn" disabled>Go</button>
  <span id="status-bar">disconnected</span>
</div>

<div id="viewport">
  <canvas id="screen" width="1280" height="720"></canvas>
</div>

<div id="overlay">
  <h2>Speculum</h2>
  <p>Headless browser stream over WebRTC</p>
  <button id="connect-btn">Connect</button>
</div>

<script>
  const BROWSER_W = 1280;
  const BROWSER_H = 720;

  const canvas     = document.getElementById('screen');
  const ctx        = canvas.getContext('2d');
  const overlay    = document.getElementById('overlay');
  const urlBar     = document.getElementById('url-bar');
  const goBtn      = document.getElementById('go-btn');
  const statusEl   = document.getElementById('status-bar');
  const connectBtn = document.getElementById('connect-btn');

  // Active channels — set once WebRTC is up.
  let inputChannel = null;
  let rpcChannel   = null;

  let scale = 1;

  // ── Layout ───────────────────────────────────────────────────────────────────

  function fitCanvas() {
    const vw = canvas.parentElement.clientWidth;
    const vh = canvas.parentElement.clientHeight;
    scale = Math.min(vw / BROWSER_W, vh / BROWSER_H);
    canvas.style.width  = (BROWSER_W * scale) + 'px';
    canvas.style.height = (BROWSER_H * scale) + 'px';
  }

  window.addEventListener('resize', fitCanvas);
  fitCanvas();

  // ── Connect ──────────────────────────────────────────────────────────────────

  connectBtn.addEventListener('click', connect);

  function connect() {
    const sessionId = crypto.randomUUID();
    const wsProto   = location.protocol === 'https:' ? 'wss' : 'ws';
    const sigUrl    = `${wsProto}://${location.host}/signaling/${sessionId}`;

    // ── Peer connection
    const pc = new RTCPeerConnection({
      iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
    });

    // ── DataChannels
    //   video  — unreliable, unordered: always prefer the freshest frame.
    //   input  — reliable, ordered: no event must be lost or reordered.
    //   rpc    — reliable, ordered: placeholder for future event-driven RPC.
    const videoChannel = pc.createDataChannel('video', { ordered: false, maxRetransmits: 0 });
    inputChannel       = pc.createDataChannel('input', { ordered: true });
    rpcChannel         = pc.createDataChannel('rpc',   { ordered: true });

    videoChannel.binaryType = 'arraybuffer';

    videoChannel.onopen  = () => setStatus('streaming');
    videoChannel.onclose = () => setStatus('video closed');

    // Latest-frame-wins: if a new frame arrives before the previous one is decoded,
    // we discard the old one. This prevents queue buildup under burst conditions.
    let pendingFrame   = null;
    let rafScheduled   = false;

    videoChannel.onmessage = (e) => {
      pendingFrame = e.data;
      if (!rafScheduled) {
        rafScheduled = true;
        requestAnimationFrame(commitFrame);
      }
    };

    function commitFrame() {
      rafScheduled = false;
      if (!pendingFrame) return;
      const data  = pendingFrame;
      pendingFrame = null;
      // createImageBitmap decodes JPEG off the main thread (browser-managed worker).
      // Much faster than Blob → URL → new Image → onload → drawImage.
      createImageBitmap(new Blob([data], { type: 'image/jpeg' })).then(bitmap => {
        ctx.drawImage(bitmap, 0, 0, BROWSER_W, BROWSER_H);
        bitmap.close();
      });
    }

    inputChannel.onopen = () => {
      goBtn.disabled = false;
      sendInput({ type: 'navigate', url: urlBar.value });
    };
    inputChannel.onclose = () => { goBtn.disabled = true; };

    // rpc — placeholder
    rpcChannel.onopen    = () => {};
    rpcChannel.onmessage = (e) => console.debug('[rpc]', e.data);

    // ── Signaling WebSocket
    const ws = new WebSocket(sigUrl);

    ws.onopen = async () => {
      setStatus('negotiating...');
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      ws.send(JSON.stringify({ type: 'offer', sdp: offer.sdp }));
    };

    ws.onmessage = async (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'answer') {
        await pc.setRemoteDescription(msg);
      } else if (msg.type === 'candidate') {
        await pc.addIceCandidate(msg.candidate).catch(() => {});
      }
    };

    ws.onerror = () => setStatus('signaling error');
    ws.onclose = () => {
      if (pc.connectionState !== 'connected') setStatus('disconnected');
    };

    // ── ICE trickle
    pc.onicecandidate = (e) => {
      if (e.candidate && ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: 'candidate', candidate: e.candidate }));
    };

    // ── Connection state
    pc.onconnectionstatechange = () => {
      setStatus(pc.connectionState);
      if (pc.connectionState === 'connected')    overlay.style.display = 'none';
      if (pc.connectionState === 'disconnected' ||
          pc.connectionState === 'failed')        overlay.style.display = 'flex';
    };
  }


  // ── Navigation ───────────────────────────────────────────────────────────────

  goBtn.addEventListener('click', navigate);
  urlBar.addEventListener('keydown', (e) => { if (e.key === 'Enter') navigate(); });

  function navigate() {
    let url = urlBar.value.trim();
    if (!url.startsWith('http')) url = 'https://' + url;
    sendInput({ type: 'navigate', url });
  }

  // ── Mouse ────────────────────────────────────────────────────────────────────

  canvas.addEventListener('click', (e) => {
    const [x, y] = canvasToPage(e);
    sendInput({ type: 'click', x, y });
  });

  canvas.addEventListener('mousemove', (e) => {
    const [x, y] = canvasToPage(e);
    sendInput({ type: 'mousemove', x, y });
  });

  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    sendInput({ type: 'wheel', deltaX: e.deltaX, deltaY: e.deltaY });
  }, { passive: false });

  function canvasToPage(e) {
    const rect = canvas.getBoundingClientRect();
    return [
      Math.round((e.clientX - rect.left) / scale),
      Math.round((e.clientY - rect.top)  / scale)
    ];
  }

  // ── Keyboard ─────────────────────────────────────────────────────────────────

  document.addEventListener('keydown', (e) => {
    if (!inputChannel || inputChannel.readyState !== 'open') return;
    if (document.activeElement === urlBar) return;
    e.preventDefault();
    if (e.key.length === 1) sendInput({ type: 'type',     text: e.key });
    else                    sendInput({ type: 'keypress', key:  e.key });
  });

  // ── Helpers ──────────────────────────────────────────────────────────────────

  function sendInput(obj) {
    if (inputChannel?.readyState === 'open')
      inputChannel.send(JSON.stringify(obj));
  }

  // Public API para o canal RPC (placeholder).
  function sendRpc(event, payload = {}) {
    if (rpcChannel?.readyState === 'open')
      rpcChannel.send(JSON.stringify({ event, payload }));
  }

  function setStatus(s) {
    statusEl.textContent = s;
  }
</script>

</body>
</html>

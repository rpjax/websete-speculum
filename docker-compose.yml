services:

  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    command:
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt
    environment:
      - ACME_EMAIL=${ACME_EMAIL:-admin@example.com}

  sidecar:
    build:
      context: ./sidecar
      dockerfile: Dockerfile
    cap_add:
      - SYS_ADMIN
    shm_size: 2gb
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - SIDECAR_PORT=3000
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - speculum-data:/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - HttpAddress=0.0.0.0:8080
      - Database__Path=/data/speculum.db
      - Sidecar__BaseUrl=ws://sidecar:3000
    depends_on:
      sidecar:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.speculum.rule=Host(`${TRAEFIK_DOMAIN}`)
      - traefik.http.routers.speculum.entrypoints=websecure
      - traefik.http.routers.speculum.tls.certresolver=le
      - traefik.http.services.speculum.loadbalancer.server.port=8080

volumes:
  speculum-data:
  traefik-letsencrypt:

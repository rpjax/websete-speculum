name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore Websete.Speculum.sln
      - name: Build
        run: dotnet build Websete.Speculum.sln -c Release --no-restore
      - name: Test
        run: dotnet test Websete.Speculum.sln -c Release --no-build --verbosity normal

  sidecar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install and test
        working-directory: sidecar
        run: |
          npm ci
          npm test

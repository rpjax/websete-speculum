<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Speculum</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #0d0d0d;
    color: #e0e0e0;
    font-family: system-ui, sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Toolbar ─────────────────────────────────────────────────────────── */
  #toolbar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    user-select: none;
  }

  #brand {
    font-size: 13px;
    font-weight: 600;
    color: #888;
    white-space: nowrap;
    letter-spacing: 0.05em;
  }

  /* URL bar is display-only — the MITM engine determines the target URL.
     Users navigate by interacting with the virtual browser itself. */
  #url-bar {
    flex: 1;
    background: #0d0d0d;
    border: 1px solid #333;
    border-radius: 4px;
    color: #888;
    font-size: 13px;
    padding: 5px 10px;
    outline: none;
    cursor: default;
    user-select: text; /* allow copying, but not typing */
  }

  #back-btn, #fwd-btn {
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    border-radius: 4px;
    color: #e0e0e0;
    cursor: pointer;
    font-size: 13px;
    padding: 5px 10px;
    white-space: nowrap;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  #back-btn:hover, #fwd-btn:hover { background: #333; }
  #back-btn:disabled, #fwd-btn:disabled { opacity: 0.4; cursor: default; }

  #status {
    font-size: 11px;
    color: #888;
    white-space: nowrap;
  }
  #status.connected   { color: #4caf50; }
  #status.connecting  { color: #ff9800; }
  #status.error       { color: #f44336; }

  /* ── FPS counter (dev only) ──────────────────────────────────────────── */
  #fps {
    display: none;
    font-size: 11px;
    color: #555;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    min-width: 52px;
    text-align: right;
  }
  #fps.active { display: block; }

  /* ── Viewport ────────────────────────────────────────────────────────── */
  #viewport {
    flex: 1 1 auto;
    position: relative;
    overflow: hidden;
    touch-action: none; /* let canvas handle all touch events */
  }

  /* Canvas covers the viewport exactly — 1:1 pixel mapping when the virtual
     browser resolution matches the viewport size (maintained via ResizeObserver
     + xrandr live resize).  No aspect-ratio letterboxing; no scaling. */
  #canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    cursor: default;
    image-rendering: auto;  /* bilinear scaling; avoids blocky nearest-neighbour */
    touch-action: none;
  }

  /* ── Overlay ─────────────────────────────────────────────────────────── */
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(13,13,13,0.85);
    gap: 16px;
  }
  #overlay.hidden { display: none; }

  #overlay p { color: #888; font-size: 14px; }

  #connect-btn {
    background: #1e88e5;
    border: none;
    border-radius: 6px;
    color: #fff;
    cursor: pointer;
    font-size: 14px;
    padding: 10px 28px;
    transition: background 0.15s;
  }
  #connect-btn:hover { background: #1565c0; }
</style>
</head>
<body>

<!-- ── Toolbar ────────────────────────────────────────────────────────────── -->
<div id="toolbar">
  <span id="brand">SPECULUM</span>
  <button id="back-btn" disabled title="Back">&#8592;</button>
  <button id="fwd-btn"  disabled title="Forward">&#8594;</button>
  <input id="url-bar" type="text" placeholder="—" spellcheck="false" readonly tabindex="-1"/>
  <span id="status" class="connecting">Connecting...</span>
  <span id="fps"></span>
</div>

<!-- ── Viewport ───────────────────────────────────────────────────────────── -->
<div id="viewport">
  <canvas id="canvas"></canvas>

  <div id="overlay">
    <p>Remote browser not connected</p>
    <button id="connect-btn">Connect</button>
  </div>
</div>

<script>
'use strict';

// ── Dev mode ──────────────────────────────────────────────────────────────────
const IS_DEV = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

// ── Protocol constants ────────────────────────────────────────────────────────
const MSG_URL         = 0x04;  // URL update from sidecar
const MSG_CONSOLE     = 0x05;  // Virtual browser console output
const MSG_EVAL_RESULT = 0x06;  // vcon() evaluation result

const VCON_METHODS = ['log', 'warn', 'error', 'info', 'debug'];

// ── DOM refs ──────────────────────────────────────────────────────────────────
const canvas     = document.getElementById('canvas');
const ctx        = canvas.getContext('2d');
const overlay    = document.getElementById('overlay');
const statusEl   = document.getElementById('status');
const urlBar     = document.getElementById('url-bar');
const backBtn    = document.getElementById('back-btn');
const fwdBtn     = document.getElementById('fwd-btn');
const connectBtn = document.getElementById('connect-btn');
const viewport   = document.getElementById('viewport');
const fpsEl      = document.getElementById('fps');

if (IS_DEV) fpsEl.classList.add('active');

// ── Session state ─────────────────────────────────────────────────────────────
let ws              = null;   // WebSocket connection (replaces WebTransport)
let decoder         = null;
let sessionId       = null;
let sessionW        = 1280;
let sessionH        = 720;
let jsBridgeEnabled = false;

// ── JsBridge — pending vcon() calls ───────────────────────────────────────────
let   _evalId      = 0;
const _evalPending = new Map(); // id → { resolve, reject, timer }

// ── Canvas layout ─────────────────────────────────────────────────────────────
function syncCanvasSize(w, h) {
  sessionW      = w;
  sessionH      = h;
  canvas.width  = w;
  canvas.height = h;
  invalidateRect();
}

// ── ResizeObserver — propagates viewport size changes to the virtual browser ──
let resizeTimer = null;

const resizeObserver = new ResizeObserver(entries => {
  const entry = entries[0];
  if (!entry) return;
  const w = Math.round(entry.contentRect.width);
  const h = Math.round(entry.contentRect.height);
  if (w < 100 || h < 100) return;
  if (w === sessionW && h === sessionH) return;

  invalidateRect();

  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    syncCanvasSize(w, h);

    // Reconfigure VideoDecoder for new dimensions
    if (decoder && decoder.state !== 'closed') {
      try {
        decoder.configure({
          codec:              'avc1.42002a',
          codedWidth:         w,
          codedHeight:        h,
          optimizeForLatency: true,
        });
      } catch (e) { console.warn('[decoder] reconfigure error', e); }
    }

    sendControl({ type: 'resize', width: w, height: h });
  }, 250);
});

resizeObserver.observe(viewport);

// ── Status indicator ──────────────────────────────────────────────────────────
function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className   = cls;
}

// ── FPS counter (dev only) ────────────────────────────────────────────────────
let fpsFrames  = 0;
let fpsLastTs  = performance.now();

function tickFps() {
  if (!IS_DEV) return;
  fpsFrames++;
  const now     = performance.now();
  const elapsed = now - fpsLastTs;
  if (elapsed >= 1000) {
    fpsEl.textContent = Math.round(fpsFrames * 1000 / elapsed) + ' fps';
    fpsFrames = 0;
    fpsLastTs = now;
  }
}

// ── Server message parser ─────────────────────────────────────────────────────
// Each WebSocket binary message is a complete protocol frame identified by its
// first byte.  No streaming reader needed — WS delivers complete messages.
//
// Server → Client message formats (all little-endian):
//   0x07 MSG_H264:        [type:1][isKeyframe:1][dataLen:4][H.264 Annex B data]
//   0x04 MSG_URL:         [type:1][len:4][UTF-8 url]
//   0x05 MSG_CONSOLE:     [type:1][level:1][len:4][UTF-8 text]
//   0x06 MSG_EVAL_RESULT: [type:1][id:4][ok:1][len:4][UTF-8 value]
function onServerMessage(event) {
  if (!(event.data instanceof ArrayBuffer)) return;
  const buf  = new Uint8Array(event.data);
  if (buf.length === 0) return;
  const view = new DataView(event.data);
  const type = buf[0];

  if (type === 0x07) { // MSG_H264 — video frame
    if (buf.length < 6) return;
    const isKeyframe = buf[1] === 1;
    const dataLen    = view.getUint32(2, true);
    if (6 + dataLen > buf.length) return;

    // If the decoder was closed due to an error, wait for the next keyframe
    // (IDR) and then recreate it — the new IDR resets the H.264 state machine.
    if (!decoder || decoder.state === 'closed') {
      if (!isKeyframe) return;   // delta frame with no live decoder → skip
      decoder = createDecoder();
      decoder.configure({
        codec:              'avc1.42002a',
        codedWidth:         sessionW,
        codedHeight:        sessionH,
        optimizeForLatency: true,
      });
    }

    if (decoder.state !== 'configured') return;
    tickFps();
    decoder.decode(new EncodedVideoChunk({
      type:      isKeyframe ? 'key' : 'delta',
      timestamp: performance.now() * 1000,
      data:      event.data.slice(6, 6 + dataLen),
    }));

  } else if (type === MSG_URL) { // 0x04 — URL update
    if (buf.length < 5) return;
    urlBar.value = new TextDecoder().decode(new Uint8Array(event.data, 5, view.getUint32(1, true)));

  } else if (type === MSG_CONSOLE) { // 0x05 — virtual browser console
    if (buf.length < 6) return;
    const level = buf[1];
    const text  = new TextDecoder().decode(new Uint8Array(event.data, 6, view.getUint32(2, true)));
    const fn    = console[VCON_METHODS[level] ?? 'log'];
    fn.call(console,
      '%c[VCON]%c ' + text,
      'color:#ff9800;font-weight:bold;font-family:monospace',
      'color:inherit;font-family:monospace',
    );

  } else if (type === MSG_EVAL_RESULT) { // 0x06 — vcon() result
    if (buf.length < 10) return;
    const id      = view.getUint32(1, true);
    const ok      = buf[5] === 1;
    const value   = new TextDecoder().decode(new Uint8Array(event.data, 10, view.getUint32(6, true)));
    const pending = _evalPending.get(id);
    if (pending) {
      clearTimeout(pending.timer);
      _evalPending.delete(id);
      const VS = 'color:#ff9800;font-weight:bold;font-family:monospace';
      if (ok) {
        if (value === '') { pending.resolve(undefined); return; }
        let parsed;
        try   { parsed = JSON.parse(value); }
        catch { parsed = value; }
        console.log('%c[VCON] ←%c', VS, 'color:inherit', parsed);
        pending.resolve(parsed);
      } else {
        console.error('%c[VCON] ←%c Error: ' + value, VS, 'color:inherit');
        pending.reject(new Error(value));
      }
    }
  }
}

// ── StreamReader helper (REMOVED — no longer needed with WebSocket) ────────────
// Dead code below kept as a placeholder to avoid breaking line-number references.
class StreamReader {
  // (StreamReader body removed — no longer needed with WebSocket)
}

// ── VideoDecoder ──────────────────────────────────────────────────────────────
function createDecoder() {
  const d = new VideoDecoder({
    output: (frame) => {
      ctx.drawImage(frame, 0, 0, sessionW, sessionH);
      frame.close();
      tickFps();
    },
    error: (e) => {
      console.warn('[VideoDecoder] error — will recreate on next keyframe:', e);
      // Explicitly close so decoder.state === 'closed' below.
      // onServerMessage skips all non-keyframes until a new decoder is ready.
      try { d.close(); } catch { /* already closed */ }
    },
  });
  return d;
}

// ── Send helpers — all events go as JSON text on the single WebSocket ─────────
function sendEvent(obj) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify(obj));
}

// Aliases kept so the rest of the event listeners need no changes.
function sendMouseMove(x, y) { sendEvent({ type: 'mousemove', x, y }); }
function sendInput(obj)       { sendEvent(obj); }
function sendControl(obj)     { sendEvent(obj); }

// ── JsBridge client — vcon() + startup banner ─────────────────────────────────
function installVcon() {
  window.vcon = function vcon(code) {
    return new Promise(function (resolve, reject) {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        reject(new Error('[vcon] No active session'));
        return;
      }
      const id = ++_evalId;
      const timer = setTimeout(function () {
        if (_evalPending.has(id)) {
          _evalPending.delete(id);
          reject(new Error('[vcon] Timed out after 10 s'));
        }
      }, 10_000);
      _evalPending.set(id, { resolve, reject, timer });
      sendControl({ type: 'evaljs', id, code });
    });
  };
}

function uninstallVcon() {
  delete window.vcon;
}

function printBanner() {
  const BADGE = 'background:#1565c0;color:#fff;font-weight:bold;padding:2px 8px;border-radius:3px;letter-spacing:.05em';
  const DIM   = 'color:#666;font-weight:bold';
  const VAL   = 'color:#ddd;font-family:monospace';
  const OK    = 'background:#1b5e20;color:#a5d6a7;padding:1px 5px;border-radius:2px;font-weight:bold';
  const NOK   = 'background:#b71c1c;color:#ef9a9a;padding:1px 5px;border-radius:2px;font-weight:bold';
  const HINT  = 'color:#666;font-style:italic';

  console.groupCollapsed(
    '%c SPECULUM %c — virtual browser bridge',
    BADGE, 'color:#888',
  );
  console.log('%cSession  %c' + sessionId,         DIM, VAL);
  console.log('%cViewport %c' + sessionW + '×' + sessionH, DIM, VAL);
  console.log('%cTransport%c WebSocket (wss)',              DIM, VAL);

  if (jsBridgeEnabled) {
    console.log('%cJsBridge %cenabled %c→ await window.vcon(code)', DIM, OK, HINT);
  } else {
    console.log('%cJsBridge %cdisabled', DIM, NOK);
  }

  console.groupEnd();
}

// ── Input helpers ─────────────────────────────────────────────────────────────
let _cachedRect = null;

function invalidateRect() { _cachedRect = null; }

function canvasToPage(clientX, clientY) {
  if (!_cachedRect) _cachedRect = canvas.getBoundingClientRect();
  return {
    x: Math.round((clientX - _cachedRect.left) * (sessionW / _cachedRect.width)),
    y: Math.round((clientY - _cachedRect.top)  * (sessionH / _cachedRect.height)),
  };
}

// ── Mouse events ──────────────────────────────────────────────────────────────
let lastMoveTime  = 0;
const pressedBtns = new Set();

canvas.addEventListener('mousemove', e => {
  const now = performance.now();
  if (now - lastMoveTime < 16) return; // ~60 Hz cap for server events
  lastMoveTime = now;
  const {x, y} = canvasToPage(e.clientX, e.clientY);
  sendMouseMove(x, y);
});

canvas.addEventListener('mousedown', e => {
  e.preventDefault();
  canvas.focus();
  pressedBtns.add(e.button);
  const {x, y} = canvasToPage(e.clientX, e.clientY);
  sendInput({ type: 'mousedown', x, y, button: e.button });
});

window.addEventListener('mouseup', e => {
  if (!pressedBtns.has(e.button)) return;
  pressedBtns.delete(e.button);
  const {x, y} = canvasToPage(e.clientX, e.clientY);
  sendInput({ type: 'mouseup', x, y, button: e.button });
});

window.addEventListener('mousemove', e => {
  if (pressedBtns.size > 0) {
    const now = performance.now();
    if (now - lastMoveTime < 16) return;
    lastMoveTime = now;
    const {x, y} = canvasToPage(e.clientX, e.clientY);
    sendMouseMove(x, y);
  }
});

canvas.addEventListener('contextmenu', e => e.preventDefault());

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const {x, y} = canvasToPage(e.clientX, e.clientY);
  let dX = e.deltaX, dY = e.deltaY;
  if      (e.deltaMode === 1) { dX *= 40; dY *= 40; }
  else if (e.deltaMode === 2) { dX *= canvas.clientWidth; dY *= canvas.clientHeight; }
  sendInput({ type: 'wheel', x, y, deltaX: dX, deltaY: dY });
}, { passive: false });

// ── Touch events ──────────────────────────────────────────────────────────────
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  canvas.focus();
  const t = e.changedTouches[0];
  if (!t) return;
  const {x, y} = canvasToPage(t.clientX, t.clientY);
  sendInput({ type: 'mousedown', x, y, button: 0 });
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  if (!t) return;
  const now = performance.now();
  if (now - lastMoveTime < 16) return;
  lastMoveTime = now;
  const {x, y} = canvasToPage(t.clientX, t.clientY);
  sendMouseMove(x, y);
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  if (!t) return;
  const {x, y} = canvasToPage(t.clientX, t.clientY);
  sendInput({ type: 'mouseup', x, y, button: 0 });
}, { passive: false });

canvas.addEventListener('touchcancel', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  if (!t) return;
  const {x, y} = canvasToPage(t.clientX, t.clientY);
  sendInput({ type: 'mouseup', x, y, button: 0 });
}, { passive: false });

// ── Keyboard events ───────────────────────────────────────────────────────────
canvas.setAttribute('tabindex', '0');

const heldKeys = new Set();

canvas.addEventListener('keydown', e => {
  if (e.key === 'F12') return;
  if ((e.ctrlKey || e.metaKey) && ['r', 'l', 't', 'w', 'n'].includes(e.key.toLowerCase())) return;

  e.preventDefault();
  heldKeys.add(e.key);
  sendInput({ type: 'keydown', key: e.key });
});

canvas.addEventListener('keyup', e => {
  if (!heldKeys.has(e.key)) return;
  heldKeys.delete(e.key);
  sendInput({ type: 'keyup', key: e.key });
});

canvas.addEventListener('blur', () => {
  for (const key of heldKeys) {
    sendInput({ type: 'keyup', key });
  }
  heldKeys.clear();
});

// ── Navigation ────────────────────────────────────────────────────────────────
backBtn.addEventListener('click', () => sendControl({ type: 'goback' }));
fwdBtn.addEventListener('click',  () => sendControl({ type: 'goforward' }));

// ── Disconnect cleanup ────────────────────────────────────────────────────────
function onDisconnected() {
  setStatus('Disconnected — click to reconnect', 'error');
  backBtn.disabled = true;
  fwdBtn.disabled  = true;
  overlay.classList.remove('hidden');
  connectBtn.disabled = false;

  heldKeys.clear();
  pressedBtns.clear();

  for (const { reject, timer } of _evalPending.values()) {
    clearTimeout(timer);
    reject(new Error('[vcon] Session closed'));
  }
  _evalPending.clear();

  if (jsBridgeEnabled) uninstallVcon();
  jsBridgeEnabled = false;

  if (decoder && decoder.state !== 'closed') {
    try { decoder.close(); } catch { /* ignore */ }
  }
  decoder = null;

  if (ws) {
    ws.onclose   = null; // prevent recursive call
    ws.onerror   = null;
    ws.onmessage = null;
    if (ws.readyState === WebSocket.OPEN) try { ws.close(); } catch { /* ignore */ }
    ws = null;
  }
}

// ── WebSocket + session creation ──────────────────────────────────────────────
async function connect() {
  setStatus('Connecting...', 'connecting');
  connectBtn.disabled = true;

  try {
    // 1. Create session via HTTP POST
    const initW = viewport.clientWidth  || 1280;
    const initH = viewport.clientHeight || 720;

    const resp = await fetch('/api/sessions', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        width:      initW,
        height:     initH,
        initialUrl: window.location.href,
      }),
    });

    if (!resp.ok) {
      const msg = await resp.text().catch(() => resp.statusText);
      throw new Error(`Session creation failed (${resp.status}): ${msg}`);
    }

    const data = await resp.json();
    sessionId       = data.sessionId;
    jsBridgeEnabled = data.jsBridgeEnabled ?? false;
    syncCanvasSize(data.width, data.height);

    // 2. Create VideoDecoder
    decoder = createDecoder();
    decoder.configure({
      codec:              'avc1.42002a', // H.264 Baseline 4.2
      codedWidth:         data.width,
      codedHeight:        data.height,
      optimizeForLatency: true,
    });

    // 3. Open WebSocket
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws/${sessionId}`);
    ws.binaryType = 'arraybuffer';

    await new Promise((resolve, reject) => {
      ws.onopen  = resolve;
      ws.onerror = (e) => reject(new Error('WebSocket connection failed'));
    });

    ws.onmessage = onServerMessage;
    ws.onclose   = () => onDisconnected();
    ws.onerror   = () => onDisconnected();

    // Ready
    setStatus('Streaming', 'connected');
    backBtn.disabled = false;
    fwdBtn.disabled  = false;
    overlay.classList.add('hidden');
    canvas.focus();

    if (jsBridgeEnabled) installVcon();
    printBanner();

  } catch (err) {
    console.error('[connect]', err);
    setStatus('Error: ' + err.message, 'error');
    connectBtn.disabled = false;
  }
}

connectBtn.addEventListener('click', connect);

// Auto-connect on load.
connect();
</script>
</body>
</html>

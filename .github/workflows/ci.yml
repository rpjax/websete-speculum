name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore Speculum.sln
      - name: Build
        run: dotnet build Speculum.sln -c Release --no-restore
      - name: Test
        run: dotnet test Speculum.sln -c Release --no-build --verbosity normal

  sidecar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install and test
        working-directory: sidecar
        run: |
          npm ci
          npm test

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install, lint, test, and build
        working-directory: web
        run: |
          npm ci
          npm run lint
          npm test
          npm run build

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate reference compose
        run: docker compose -f deploy/compose/docker-compose.reference.yml config

  dockup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dockup
        run: npm install -g @rodrigopjax/dockup@2.0.2
      - name: Validate dockup manifest
        working-directory: deploy
        run: dockup validate --root ..

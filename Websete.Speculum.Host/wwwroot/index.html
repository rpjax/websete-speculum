<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Speculum</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #0d0d0d;
    color: #e0e0e0;
    font-family: system-ui, sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Toolbar ─────────────────────────────────────────────────────────── */
  #toolbar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    user-select: none;
  }

  #brand {
    font-size: 13px;
    font-weight: 600;
    color: #888;
    white-space: nowrap;
    letter-spacing: 0.05em;
  }

  #url-bar {
    flex: 1;
    background: #0d0d0d;
    border: 1px solid #333;
    border-radius: 4px;
    color: #888;
    font-size: 13px;
    padding: 5px 10px;
    outline: none;
    cursor: text;
    user-select: text;
  }
  #url-bar:focus {
    border-color: #1e88e5;
    color: #e0e0e0;
    background: #111;
  }
  #url-bar:disabled {
    cursor: default;
    opacity: 0.5;
  }

  #back-btn, #fwd-btn {
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    border-radius: 4px;
    color: #e0e0e0;
    cursor: pointer;
    font-size: 13px;
    padding: 5px 10px;
    white-space: nowrap;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  #back-btn:hover, #fwd-btn:hover { background: #333; }
  #back-btn:disabled, #fwd-btn:disabled { opacity: 0.4; cursor: default; }

  #status {
    font-size: 11px;
    color: #888;
    white-space: nowrap;
  }
  #status.connected   { color: #4caf50; }
  #status.connecting  { color: #ff9800; }
  #status.error       { color: #f44336; }

  #fps {
    display: none;
    font-size: 11px;
    color: #555;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    min-width: 52px;
    text-align: right;
  }
  #fps.active { display: block; }

  /* ── Viewport ────────────────────────────────────────────────────────── */
  #viewport {
    flex: 1 1 auto;
    position: relative;
    overflow: hidden;
    touch-action: none;
  }

  #canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    cursor: default;
    image-rendering: auto;
    touch-action: none;
  }

  /* ── Overlay ─────────────────────────────────────────────────────────── */
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(13,13,13,0.85);
    gap: 16px;
  }
  #overlay.hidden { display: none; }

  #overlay p { color: #888; font-size: 14px; }

  #connect-btn {
    background: #1e88e5;
    border: none;
    border-radius: 6px;
    color: #fff;
    cursor: pointer;
    font-size: 14px;
    padding: 10px 28px;
    transition: background 0.15s;
  }
  #connect-btn:hover { background: #1565c0; }
</style>
</head>
<body>

<!-- ── Toolbar ────────────────────────────────────────────────────────────── -->
<div id="toolbar">
  <span id="brand">SPECULUM</span>
  <button id="back-btn" disabled title="Back">&#8592;</button>
  <button id="fwd-btn"  disabled title="Forward">&#8594;</button>
  <input id="url-bar" type="text" placeholder="—" spellcheck="false" disabled/>
  <span id="status" class="connecting">Connecting...</span>
  <span id="fps"></span>
</div>

<!-- ── Viewport ───────────────────────────────────────────────────────────── -->
<div id="viewport">
  <canvas id="canvas"></canvas>
  <div id="overlay">
    <p>Remote browser not connected</p>
    <button id="connect-btn">Connect</button>
  </div>
</div>

        crossorigin="anonymous"></script>
<script src="/js/speculum-client.js"></script>
</body>
</html>

services:

  traefik:
    image: traefik:v3.6.1
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - >-
        set -a; for f in /data/traefik/cloudflare-*.env; do [ -f "$$f" ] && . "$$f"; done; set +a;
        exec /entrypoint.sh traefik
        --api.dashboard=false
        --providers.docker=true
        --providers.docker.exposedbydefault=false
        --providers.docker.network=speculum
        --entrypoints.web.address=:80
        --entrypoints.websecure.address=:443
        --entrypoints.websecure.http.tls=true
        --providers.file.directory=/data/traefik/dynamic
        --providers.file.watch=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt
      - speculum-data:/data

  sidecar:
    build:
      context: ../../sidecar
      dockerfile: Dockerfile
    cap_add:
      - SYS_ADMIN
    shm_size: 2gb
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - SIDECAR_PORT=3000
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3

  api:
    build:
      context: ../../Speculum.Api
      dockerfile: Dockerfile
    image: speculum-api
    restart: unless-stopped
    volumes:
      - speculum-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - HttpAddress=0.0.0.0:8080
      - Database__Path=/data/speculum.db
      - Sidecar__BaseUrl=ws://sidecar:3000
      - Traefik__Root=/data/traefik
      - Traefik__DynamicDir=/data/traefik/dynamic
      - Traefik__DockerSocket=/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
    depends_on:
      sidecar:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.services.speculum-api.loadbalancer.server.port=8080

  web:
    build:
      context: ../../web
      dockerfile: Dockerfile
    image: speculum-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    labels:
      - traefik.enable=true
      - traefik.http.services.speculum-web.loadbalancer.server.port=80

volumes:
  speculum-data:
  traefik-letsencrypt:
